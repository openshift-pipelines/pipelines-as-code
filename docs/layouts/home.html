{{ define "main" }}
<div class="hx:mx-auto hx:flex hextra-max-page-width">
  {{ partial "sidebar.html" (dict "context" . "disableSidebar" true) }}
  <article
    class="hx:w-full hx:break-words hx:flex hx:min-h-[calc(100vh-var(--navbar-height))] hx:min-w-0 hx:justify-center hx:pb-8 hx:pr-[calc(env(safe-area-inset-right)-1.5rem)]"
  >
    <main
      id="content"
      class="hx:w-full hx:min-w-0 hextra-max-content-width hx:px-6 hx:pt-4 hx:md:px-12"
    >
      {{/* Hero block: banner image + subtitle */}}
      <header class="not-prose hx:text-center hx:mb-12 hx:md:mb-16">
        <div class="pac-hero-banner">
          <img
            src="images/pac-logo-with-tagline-small.png"
            alt="Pipelines as Code — The Modern CI/CD Solution"
          />
        </div>
        {{ with .Param "hero_subtitle" }}
        <p
          class="hx:mt-6 hx:text-xl hx:text-gray-600 hx:dark:text-gray-400 hx:max-w-2xl hx:mx-auto"
        >
          {{ . }}
        </p>
        {{ end }}
      </header>
      <div class="content">{{ .Content }}</div>
      <div style="text-align:center; margin-top:3rem; margin-bottom:1rem;">
        <a href="/docs/" class="pac-cta-button">
          Read the documentation &rarr;
        </a>
      </div>
    </main>
  </article>
</div>
{{ end }}
